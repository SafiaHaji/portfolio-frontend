<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Personal Portfolio</title>
    <style>
        /* Modern Color Palette & Variables */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --header-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent-color: #319795;
            --accent-hover: #2c7a7b;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

        /* Hero Header Design */
        header {
            background: var(--header-gradient);
            color: white;
            text-align: center;
            padding: 4.5rem 1.5rem;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.2);
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: -0.5px;
            font-weight: 800;
        }

        header p {
            margin: 0.75rem 0 0 0;
            font-size: 1.25rem;
            color: #e2e8f0;
            font-weight: 400;
        }

        /* Layout Container */
        .container {
            max-width: 900px;
            margin: -2.5rem auto 4rem auto;
            padding: 0 1.5rem;
        }

        /* Modern Dashboard Cards */
        section {
            background: var(--card-bg);
            padding: 2.5rem;
            margin-bottom: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        section:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        h2 {
            color: #1e3c72;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 0.75rem;
        }

        p#user-bio {
            font-size: 1.1rem;
            color: #4a5568;
        }

        /* Stylish Lists for Skills & Qualifications */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        li {
            background: #f7fafc;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            font-weight: 500;
            color: #4a5568;
        }

        /* Dynamic Projects Cards Grid */
        #projects-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .project {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #1e3c72;
            margin-top: 0;
            transition: background 0.2s ease;
        }

        .project:hover {
            background: #f1f5f9;
        }

        .project h3 {
            margin: 0 0 0.5rem 0;
            color: #1e3c72;
            font-size: 1.25rem;
        }

        .project p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Contact Details & Action Button */
        #contact-sec p {
            margin: 0.75rem 0;
            font-size: 1.05rem;
        }

        .btn-github {
            display: inline-flex;
            align-items: center;
            background: #24292e;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 1rem;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn-github:hover {
            background: #1a1e22;
            transform: scale(1.02);
        }

        /* Loading Screen UI */
        .loading {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e3c72;
            padding: 8rem 2rem;
            background: var(--bg-gradient);
            min-height: 100vh;
            box-sizing: border-box;
        }

        .spinner {
            border: 4px solid rgba(30, 60, 114, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #1e3c72;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader" class="loading">
        <div class="spinner"></div>
        Connecting to Render cloud API infrastructure...
    </div>

    <div id="portfolio-content" style="display: none;">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-title"></p>
        </header>

        <div class="container">
            <section>
                <h2>Personal Profile</h2>
                <p id="user-bio"></p>
            </section>

            <section>
                <h2>Core Expertise & Skills</h2>
                <ul id="skills-list"></ul>
            </section>

            <section>
                <h2>Key Qualifications</h2>
                <ul id="qualifications-list"></ul>
            </section>

            <section>
                <h2>Featured Projects</h2>
                <div id="projects-list"></div>
            </section>

            <section id="contact-sec">
                <h2>Contact & Channels</h2>
                <p><strong>Operational Base:</strong> <span id="user-location"></span></p>
                <p><strong>Professional Email:</strong> <span id="user-email"></span></p>
                <a id="github" class="btn-github" href="#" target="_blank">View GitHub Profile</a>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
